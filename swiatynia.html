<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Komnata VI · Świątynia — SECTIO AUREA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#08070d;--ink:#0c0b14;--panel:rgba(17,15,26,.9);--panel-2:#191527;
  --line:rgba(227,178,60,.18);--line-soft:rgba(236,230,214,.1);
  --gold:#e3b23c;--gold-br:#f2d27a;--gold-deep:#a9801f;
  --ivory:#ece6d6;--mute:#9a93a6;--faint:#6b6478;
  --verd:#5fb8a3;--crimson:#d2553f;--amber:#e0913a;
  --ease:cubic-bezier(.4,.01,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--void);color:var(--ivory);overflow:hidden;
  font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
#scene{position:fixed;inset:0;z-index:0}
canvas{display:block}
.serif{font-family:"Fraunces",Georgia,serif}
#vig{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(125% 95% at 50% 42%,transparent 48%,rgba(0,0,0,.62) 100%)}

/* topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;pointer-events:none}
.brand{display:flex;align-items:baseline;gap:10px;pointer-events:auto}
.brand .phi{font-family:"Fraunces",serif;font-size:21px;color:var(--gold)}
.brand b{font-family:"Fraunces",serif;font-weight:500;font-size:15px;letter-spacing:.13em}
.brand small{font-size:9.5px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase}
.back{pointer-events:auto;font-size:12px;letter-spacing:.04em;color:var(--mute);text-decoration:none;
  padding:8px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(8,7,13,.5);
  backdrop-filter:blur(8px);transition:.25s}
.back:hover{color:var(--gold-br);border-color:var(--gold)}

/* info panel */
.panel{position:fixed;top:50%;right:26px;transform:translateY(-50%);z-index:10;width:340px;max-width:86vw;
  background:var(--panel);backdrop-filter:blur(15px);border:1px solid var(--line);border-radius:18px;
  padding:24px 24px 22px;box-shadow:0 30px 80px -40px #000;transition:opacity .4s,transform .4s}
.panel .el{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.panel .el .glyph{font-size:14px}
.panel h1{font-family:"Fraunces",serif;font-weight:400;font-size:30px;margin:8px 0 2px;line-height:1.04}
.panel .gloss{font-size:12.5px;color:var(--mute);font-style:italic;margin-bottom:15px}
.panel .nums{display:flex;gap:8px;margin-bottom:15px}
.panel .nums .n{flex:1;text-align:center;border:1px solid var(--line-soft);border-radius:10px;padding:9px 4px;background:rgba(0,0,0,.2)}
.panel .nums .n b{font-family:"Fraunces",serif;font-size:20px;color:var(--gold-br);display:block;line-height:1}
.panel .nums .n span{font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin-top:4px;display:block}
.panel .quote{font-family:"Fraunces",serif;font-style:italic;font-size:14.5px;line-height:1.5;color:var(--ivory);
  border-left:2px solid var(--gold);padding-left:14px;margin:0 0 6px}
.panel .quote .src{display:block;font-style:normal;font-family:Inter;font-size:10.5px;letter-spacing:.05em;color:var(--faint);margin-top:7px}
.panel .note{font-size:12.5px;line-height:1.62;color:#c2bbcf;margin-top:13px}
.panel .note b{color:var(--ivory)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;margin-top:15px}
.chip::before{content:"";width:6px;height:6px;border-radius:50%}
.chip.rygor{color:var(--gold-br);background:rgba(227,178,60,.1);border:1px solid rgba(227,178,60,.3)}
.chip.rygor::before{background:var(--gold)}
.chip.mat{color:var(--verd);background:rgba(95,184,163,.1);border:1px solid rgba(95,184,163,.3)}
.chip.mat::before{background:var(--verd)}
.chip.mix{color:var(--amber);background:rgba(224,145,58,.1);border:1px solid rgba(224,145,58,.3)}
.chip.mix::before{background:var(--amber)}

/* dock */
.dock{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:12px;width:max-content;max-width:94vw}
.solids{display:flex;gap:7px;background:rgba(8,7,13,.55);backdrop-filter:blur(12px);
  border:1px solid var(--line-soft);border-radius:14px;padding:7px}
.solids button{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:86px;
  background:transparent;border:1px solid transparent;border-radius:10px;padding:9px 8px;cursor:pointer;transition:.22s;color:var(--mute)}
.solids button svg{width:26px;height:26px;opacity:.7;transition:.22s}
.solids button b{font-size:10px;letter-spacing:.02em;font-weight:500;color:var(--ivory);text-align:center}
.solids button span{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);text-align:center}
.solids button:hover{background:rgba(255,255,255,.04)}
.solids button:hover svg{opacity:1}
.solids button.active{background:rgba(224,145,58,.13);border-color:var(--amber)}
.solids button.active svg{opacity:1}
.solids button.active span{color:var(--amber)}
.solids button.active b{color:var(--gold-br)}

.hint{position:fixed;bottom:26px;left:24px;z-index:10;font-size:10.5px;letter-spacing:.04em;color:var(--faint);max-width:200px;line-height:1.7}
.hint b{color:var(--mute)}

#loading{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--void);transition:opacity .8s}
#loading.gone{opacity:0;pointer-events:none}
#loading .ph{font-family:"Fraunces",serif;font-size:60px;color:var(--gold);animation:spin 3s linear infinite}
#loading p{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);margin-top:18px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:760px){
  .panel{top:auto;bottom:150px;right:50%;transform:translateX(50%);width:min(420px,92vw)}
  .hint{display:none}
}
@media(max-width:600px){
  .panel{background:rgba(12,10,20,.95);bottom:128px;max-height:54vh;overflow-y:auto;z-index:50}
  .solids button{min-width:0;padding:8px 9px}
  .solids button b,.solids button span{display:none}
}
@media(prefers-reduced-motion:reduce){#loading .ph{animation:none}}
</style>
</head>
<body>
<div id="scene"></div>
<div id="vig"></div>

<div class="topbar">
  <div class="brand"><span class="phi">Φ</span><b>SECTIO&nbsp;AUREA</b><small>Komnata VI · Świątynia</small></div>
  <a class="back" href="atlas.html#atlas">← Atlas</a>
</div>

<aside class="panel" id="panel"><!-- filled by JS --></aside>

<div class="dock">
  <div class="solids" id="solids"><!-- buttons by JS --></div>
</div>

<div class="hint">Przeciągnij, by obrócić<br><b>scroll</b> = przybliż · idle obraca sam</div>

<div id="loading"><div class="ph">Φ</div><p>wznoszę świątynię</p></div>

<script src="i18n.js"></script>
<script src="progress.js"></script>
<script src="menu.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const PHI=(1+Math.sqrt(5))/2;
const C={gold:0xf2d27a,goldDim:0xe3b23c,verd:0x5fb8a3,ivory:0xece6d6,crimson:0xd2553f,amber:0xe0913a};

/* ---------- renderer / scene / camera ---------- */
const host=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
host.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x08070d);
scene.fog=new THREE.FogExp2(0x08070d,0.055);

const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,100);
camera.position.set(2.6,2.0,7.4);            // slight 3/4 so the depth reads, but facade-forward for overlays

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;
controls.autoRotate=true;controls.autoRotateSpeed=0.45;
controls.minDistance=4.6;controls.maxDistance=15;
controls.target.set(0,1.55,0);
controls.minPolarAngle=0.55;controls.maxPolarAngle=Math.PI*0.62;
controls.enablePan=false;

/* environment for subtle marble reflections */
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

/* lights */
scene.add(new THREE.AmbientLight(0xffffff,0.28));
const key=new THREE.DirectionalLight(0xffe9c0,1.55);key.position.set(4,7,6);scene.add(key);
const rim=new THREE.DirectionalLight(0x88b8ff,0.65);rim.position.set(-6,1,-5);scene.add(rim);
const fill=new THREE.PointLight(0xf2d27a,0.9,18);fill.position.set(0,2.4,4.5);scene.add(fill);

/* ---------- starfield ---------- */
const stars=(()=>{
  const N=1600,pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=9+Math.random()*18,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);
  }
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0xe3b23c,size:0.04,transparent:true,opacity:0.5,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
  const p=new THREE.Points(g,m);scene.add(p);return p;
})();

/* ---------- post-processing (bloom) ---------- */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.42,0.5,0.92);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ================================================================
   ORYGINALNA GEOMETRIA — fasada świątyni doryckiej (z brył three.js)
   Współrzędne dobrane tak, by FRONT fasady leżał na płaszczyźnie z=FRONT.
   Wszystkie wymiary zapisane jako STAŁE, by nakładki mogły je mierzyć.
   ================================================================ */
const FRONT=1.0;                 // z przedniej lica fasady (płaszczyzna nakładek)
const HALF_W=2.7;                // połowa szerokości stylobatu (skrajne lico kolumn ≈ ±2.45)
const STEP_H=0.16;               // wysokość jednego stopnia krepidomy
const N_STEPS=3;                 // trójstopniowa krepidoma (stylobat = górny stopień)
const STYLO_Y=N_STEPS*STEP_H;    // poziom posadzki kolumnady (góra stylobatu)
const COL_H=2.35;                // wysokość trzonu kolumny
const COL_R=0.2;                 // promień trzonu
const N_COL=8;                   // oktastyl — 8 kolumn (jak Partenon na froncie)
const ARCH_H=0.62;               // wysokość belkowania (architraw + fryz + gzyms)
const ARCH_TOP=STYLO_Y+COL_H+ARCH_H;       // górne lico belkowania = baza tympanonu
const PED_H=0.78;                // wysokość tympanonu (od bazy do kalenicy)
const APEX_Y=ARCH_TOP+PED_H;     // szczyt (akroterion)
const DEPTH=1.7;                 // głębokość bryły (oś z)

/* marmur — kość słoniowa PBR */
const marble=new THREE.MeshPhysicalMaterial({
  color:0xcfc8b4,metalness:0.0,roughness:0.62,
  clearcoat:0.3,clearcoatRoughness:0.6,reflectivity:0.3,
  sheen:0.35,sheenColor:new THREE.Color(0xfff6e0),sheenRoughness:0.7});
const marbleWarm=new THREE.MeshPhysicalMaterial({
  color:0xd8d0bb,metalness:0.0,roughness:0.55,
  clearcoat:0.35,clearcoatRoughness:0.55,reflectivity:0.35,
  sheen:0.4,sheenColor:new THREE.Color(0xfff6e0),sheenRoughness:0.65});

const temple=new THREE.Group();scene.add(temple);

/* współdzielone geometrie (wydajność: jedna geo trzonu / kapitelu / stopnia) */
const shaftGeo=new THREE.CylinderGeometry(COL_R*0.86,COL_R,COL_H,28,1,false); // lekki entasis (zwężenie ku górze)
const echinusGeo=new THREE.CylinderGeometry(COL_R*1.18,COL_R*0.9,0.12,28);    // echinus (poduszka kapitelu)
const abacusGeo=new THREE.BoxGeometry(COL_R*2.7,0.1,COL_R*2.7);               // abakus (płyta kapitelu)

/* --- krepidoma: trzy cofające się stopnie --- */
for(let i=0;i<N_STEPS;i++){
  const inset=i*0.22;
  const w=(HALF_W-inset)*2, d=(DEPTH/2+0.55-inset)*2;
  const step=new THREE.Mesh(new THREE.BoxGeometry(w,STEP_H,d),marble);
  step.position.set(0,STEP_H/2+i*STEP_H,0);
  temple.add(step);
}

/* --- kolumny: trzon + żłobkowanie (kanelury) + kapitel --- */
const colXs=[];
for(let i=0;i<N_COL;i++){
  const t=N_COL===1?0.5:i/(N_COL-1);
  const x=-HALF_W*0.9+t*(HALF_W*1.8);
  colXs.push(x);
  const col=new THREE.Group();col.position.set(x,STYLO_Y,0);

  const shaft=new THREE.Mesh(shaftGeo,marble);
  shaft.position.y=COL_H/2;col.add(shaft);

  /* kanelury — 20 dorycka norma; cienkie pionowe listwy jako sugestia żłobień */
  const fluteGeo=new THREE.BoxGeometry(0.012,COL_H*0.97,0.012);
  const N_FL=20;
  for(let f=0;f<N_FL;f++){
    const a=(f/N_FL)*Math.PI*2;
    const fl=new THREE.Mesh(fluteGeo,marbleWarm);
    fl.position.set(Math.cos(a)*COL_R*0.97,COL_H/2,Math.sin(a)*COL_R*0.97);
    col.add(fl);
  }

  const ech=new THREE.Mesh(echinusGeo,marbleWarm);ech.position.y=COL_H+0.06;col.add(ech);
  const ab=new THREE.Mesh(abacusGeo,marbleWarm);ab.position.y=COL_H+0.17;col.add(ab);

  temple.add(col);
}

/* --- belkowanie (architraw + fryz + gzyms) jako jeden pas --- */
const archGeo=new THREE.BoxGeometry(HALF_W*2,ARCH_H,DEPTH+0.3);
const architrave=new THREE.Mesh(archGeo,marbleWarm);
architrave.position.set(0,STYLO_Y+COL_H+0.17+ARCH_H/2,0);
temple.add(architrave);

/* tryglify — rytm na fryzie (drobne pionowe bloki, czysto dekoracyjnie) */
const trigGeo=new THREE.BoxGeometry(0.1,0.22,0.06);
const fryzY=STYLO_Y+COL_H+0.17+ARCH_H*0.72;
for(let i=0;i<N_COL*2-1;i++){
  const t=i/(N_COL*2-2);
  const x=-HALF_W*0.92+t*(HALF_W*1.84);
  const tg=new THREE.Mesh(trigGeo,marble);tg.position.set(x,fryzY,DEPTH/2+0.151);temple.add(tg);
}

/* --- tympanon (trójkątny fronton) jako pryzma --- */
function makePediment(){
  const top=ARCH_TOP, base=HALF_W, apex=PED_H;
  const shape=new THREE.Shape();
  shape.moveTo(-base,0);shape.lineTo(base,0);shape.lineTo(0,apex);shape.closePath();
  const geo=new THREE.ExtrudeGeometry(shape,{depth:DEPTH+0.3,bevelEnabled:false});
  geo.translate(0,top,-(DEPTH/2+0.15));
  const ped=new THREE.Mesh(geo,marble);
  temple.add(ped);
  /* gzyms wieńczący (cienka rama tympanonu po froncie) */
  const frontZ=DEPTH/2+0.151;
  const corn=new THREE.Group();
  const len=Math.hypot(base,apex);
  const bar=new THREE.BoxGeometry(len,0.07,0.05);
  const lL=new THREE.Mesh(bar,marbleWarm);
  lL.position.set(-base/2,top+apex/2,frontZ);lL.rotation.z=Math.atan2(apex,base);corn.add(lL);
  const lR=new THREE.Mesh(bar,marbleWarm);
  lR.position.set(base/2,top+apex/2,frontZ);lR.rotation.z=-Math.atan2(apex,base);corn.add(lR);
  temple.add(corn);
}
makePediment();

/* posadzka — delikatny dysk pod świątynią, łapie cień świetlny */
const ground=new THREE.Mesh(new THREE.CircleGeometry(7,64),
  new THREE.MeshStandardMaterial({color:0x14121d,roughness:0.9,metalness:0}));
ground.rotation.x=-Math.PI/2;ground.position.y=-0.01;temple.add(ground);

/* ================================================================
   NAKŁADKI PROPORCJI — three.js LineSegments na płaszczyźnie z=FRONT,
   zablokowane do lica fasady (orbitują razem z bryłą, pozostają ostre).
   ================================================================ */
const overlayGroup=new THREE.Group();scene.add(overlayGroup);

/* pomocnik: prostokąt z naroży (x0,y0)-(x1,y1) na płaszczyźnie z=FRONT+eps */
function rectLine(x0,y0,x1,y1,color,opacity,z){
  z=z===undefined?FRONT+0.02:z;
  const p=[
    new THREE.Vector3(x0,y0,z),new THREE.Vector3(x1,y0,z),
    new THREE.Vector3(x1,y1,z),new THREE.Vector3(x0,y1,z),
    new THREE.Vector3(x0,y0,z)
  ];
  const g=new THREE.BufferGeometry().setFromPoints(p);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:opacity||0.95}));
}
function segLine(pts,color,opacity,z){
  z=z===undefined?FRONT+0.02:z;
  const v=pts.map(p=>new THREE.Vector3(p[0],p[1],z));
  const g=new THREE.BufferGeometry().setFromPoints(v);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:opacity||0.9}));
}
function fillQuad(x0,y0,x1,y1,color,opacity,z){
  z=z===undefined?FRONT+0.015:z;
  const a=new THREE.Vector3(x0,y0,z),b=new THREE.Vector3(x1,y0,z),
        c=new THREE.Vector3(x1,y1,z),d=new THREE.Vector3(x0,y1,z);
  const g=new THREE.BufferGeometry().setFromPoints([a,b,c,a,c,d]);
  return new THREE.Mesh(g,new THREE.MeshBasicMaterial({color,transparent:true,opacity:opacity||0.06,side:THREE.DoubleSide,depthWrite:false}));
}

/* skrajne lico kolumn / pełna wysokość fasady (do tympanonu) — realne granice bryły */
const FACE_L=colXs[0]-COL_R*1.35, FACE_R=colXs[N_COL-1]+COL_R*1.35;  // zewnętrzne lico skrajnych kolumn
const FACE_W=FACE_R-FACE_L;
const BASE_Y=0;                                  // posadzka krepidomy
const FACE_H_FULL=APEX_Y;                        // do kalenicy

/* --- NAKŁADKA 1: Mit złotego prostokąta (1 : φ) --- */
const ovGold=new THREE.Group();ovGold.visible=false;overlayGroup.add(ovGold);
(function(){
  /* Aby prostokąt φ "pasował", trzeba OSZUKAĆ punkty pomiaru:
     wysokość mierzymy od 2. stopnia (nie od ziemi) do gzymsu (nie do kalenicy),
     a szerokość węższą niż realna fasada. Pokazujemy to UCZCIWIE liniami błędu. */
  const fudgeBottom=STEP_H*1.6;                  // start pomiaru: dopiero od 2. stopnia
  const h=ARCH_TOP-fudgeBottom;                  // do górnego lica belkowania (pomijamy cały tympanon!)
  const w=h*PHI;                                 // szerokość WYMUSZONA przez φ
  const cx=0, x0=cx-w/2, x1=cx+w/2, y0=fudgeBottom, y1=ARCH_TOP;
  ovGold.add(fillQuad(x0,y0,x1,y1,C.amber,0.05));
  ovGold.add(rectLine(x0,y0,x1,y1,C.amber,0.95));
  /* podział złoty wewnątrz (kwadrat + mniejszy prostokąt) */
  const sq=x0+h;                                  // bok kwadratu = wysokość
  ovGold.add(segLine([[sq,y0],[sq,y1]],C.gold,0.7));
  /* linie WSTYDU — pokazują, ile realnej bryły wystaje poza prostokąt */
  const eMat={c:C.crimson,o:0.85};
  ovGold.add(segLine([[FACE_L,BASE_Y],[FACE_L,fudgeBottom]],eMat.c,eMat.o));   // ucięte stopnie
  ovGold.add(segLine([[FACE_R,BASE_Y],[FACE_R,fudgeBottom]],eMat.c,eMat.o));
  ovGold.add(segLine([[-HALF_W,ARCH_TOP],[0,APEX_Y]],eMat.c,0.6));             // pominięty tympanon
  ovGold.add(segLine([[HALF_W,ARCH_TOP],[0,APEX_Y]],eMat.c,0.6));
  /* znaczniki naroży */
  const nodeGeo=new THREE.SphereGeometry(0.05,14,14);
  [[x0,y0],[x1,y0],[x1,y1],[x0,y1]].forEach(p=>{
    const m=new THREE.Mesh(nodeGeo,new THREE.MeshBasicMaterial({color:C.amber}));
    m.position.set(p[0],p[1],FRONT+0.03);ovGold.add(m);
  });
})();

/* --- NAKŁADKA 2: Dynamiczna symetria — prostokąty pierwiastkowe Hambidge'a --- */
const ovRoot=new THREE.Group();ovRoot.visible=false;overlayGroup.add(ovRoot);
(function(){
  /* Prostokąty pierwiastkowe dzielą JEDNĄ wysokość bazową; szerokość = h*√n.
     Spina je realna wysokość fasady (od posadzki do gzymsu) — i obejmują kolejne kolumny. */
  const baseH=ARCH_TOP-BASE_Y;
  const unit=baseH;                               // krótszy bok = pełna wysokość kolumnady
  const roots=[
    {n:2,col:C.verd,  lab:'√2'},
    {n:3,col:C.gold,  lab:'√3'},
    {n:5,col:C.gold, lab:'√5'}
  ];
  /* rysujemy współśrodkowo wokół osi, każdy szerszy */
  roots.forEach((r,i)=>{
    const w=unit*Math.sqrt(r.n);
    const x0=-w/2,x1=w/2,y0=BASE_Y,y1=BASE_Y+unit;
    ovRoot.add(rectLine(x0,y0,x1,y1,r.col,0.55+i*0.12,FRONT+0.02+i*0.004));
    if(i===2)ovRoot.add(fillQuad(x0,y0,x1,y1,r.col,0.04));
  });
  /* przekątna prostokąta √5 — to z niej powstaje φ = (1+√5)/2 */
  const w5=unit*Math.sqrt(5);
  ovRoot.add(segLine([[-w5/2,BASE_Y],[w5/2,BASE_Y+unit]],C.goldDim,0.8,FRONT+0.05));
  const nodeGeo=new THREE.SphereGeometry(0.045,14,14);
  [[-w5/2,BASE_Y],[w5/2,BASE_Y+unit]].forEach(p=>{
    const m=new THREE.Mesh(nodeGeo,new THREE.MeshBasicMaterial({color:C.goldDim}));
    m.position.set(p[0],p[1],FRONT+0.06);ovRoot.add(m);
  });
})();

/* --- NAKŁADKA 3: Prawdziwe liczby — współmierny stosunek ~9:4 --- */
const ovWhole=new THREE.Group();ovWhole.visible=false;overlayGroup.add(ovWhole);
(function(){
  /* 9:4 rządzi kilkoma wymiarami Partenonu (szer.:wys., długość:szer., rozstaw:średnica).
     Pokazujemy siatkę współmierną: szerokość fasady = 9 modułów, wysokość = 4 moduły. */
  const gridW=FACE_W, gridH=ARCH_TOP-BASE_Y;
  const mod=gridW/9;                              // jeden moduł
  const x0=FACE_L, y0=BASE_Y;
  /* rama 9×4 */
  ovWhole.add(rectLine(FACE_L,BASE_Y,FACE_R,ARCH_TOP,C.verd,0.9));
  ovWhole.add(fillQuad(FACE_L,BASE_Y,FACE_R,ARCH_TOP,C.verd,0.04));
  /* pionowe linie modułów (9) */
  for(let i=1;i<9;i++){
    ovWhole.add(segLine([[x0+i*mod,y0],[x0+i*mod,ARCH_TOP]],C.verd,0.28));
  }
  /* poziome linie modułów (4) — moduł poziomy = gridH/4, żeby pokazać współmierność proporcji 9:4 */
  const vmod=gridH/4;
  for(let j=1;j<4;j++){
    ovWhole.add(segLine([[FACE_L,y0+j*vmod],[FACE_R,y0+j*vmod]],C.verd,0.28));
  }
})();

/* ---------- TRYBY (dock) ---------- */
const MODES={
  mit:{name:'Mit złotego prostokąta',tag:'1 : 1,618',glyph:'△',verd:'mit',
    gloss:'legenda, którą trzeba naciągnąć',
    a:'φ ≈ 1,618',b:'naciągane',cN:'pomiar',
    quote:'Nie ma żadnego niezawodnego dowodu, że Partenon zaprojektowano w oparciu o złoty podział.',
    src:'George Markowsky, „Misconceptions about the Golden Ratio” (1992)',
    note:'Złoty prostokąt <b>pasuje tylko wtedy</b>, gdy dobierzemy, skąd dokąd mierzyć: zaczynamy od drugiego stopnia (czerwone linie poniżej) i <b>pomijamy cały tympanon</b> (czerwone linie u góry). Inaczej proporcja 1:φ nie wychodzi. To nie projekt — to <b>dopasowanie po fakcie</b>.'},
  root:{name:'Dynamiczna symetria',tag:'√2 · √3 · √5',glyph:'◇',verd:'rygor',
    gloss:'realna grecka logika proporcji',
    a:'√n',b:'konstruowalne',cN:'Hambidge',
    quote:'Grecka sztuka projektowania operowała stosunkami niewymiernymi, ale konstruowalnymi — prostokątami pierwiastkowymi.',
    src:'Jay Hambidge, „Dynamic Symmetry” (1920)',
    note:'Prostokąty <b>√2, √3, √5</b> buduje się cyrklem i linijką z kwadratu. To była <b>prawdziwa</b> grecka logika kompozycji — i pasuje do bryły lepiej niż mit φ. A √5 wiąże się ze złotą liczbą wprost: <b>φ = (1 + √5) / 2</b> (przekątna prostokąta √5).'},
  liczby:{name:'Prawdziwe liczby',tag:'9 : 4',glyph:'▦',verd:'rygor',
    gloss:'współmierna harmonia liczb całkowitych',
    a:'9 : 4',b:'współmierne',cN:'moduł',
    quote:'Szerokość do wysokości, długość do szerokości, rozstaw kolumn do ich średnicy — wszędzie powraca stosunek 9 do 4.',
    src:'Analiza wymiarów Partenonu (kanon dorycki)',
    note:'Partenonem rządzi prosty, <b>współmierny</b> stosunek <b>9:4</b> — powtórzony w wielu wymiarach budowli. To grecka harmonia <b>liczb całkowitych</b>, a nie niewymierne φ. Rygor był — tylko liczbowy, modularny.'}
};
const ORDER=['mit','root','liczby'];
const OVMAP={mit:ovGold,root:ovRoot,liczby:ovWhole};

const ICONS={
  mit:'<rect x="3" y="6" width="20" height="14" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="11" y1="6" x2="11" y2="20" stroke="currentColor" stroke-width="1"/>',
  root:'<rect x="3" y="4" width="20" height="18" fill="none" stroke="currentColor" stroke-width="1.1"/><rect x="6" y="7" width="14" height="12" fill="none" stroke="currentColor" stroke-width="1.1"/><line x1="3" y1="22" x2="23" y2="4" stroke="currentColor" stroke-width="1"/>',
  liczby:'<rect x="3" y="7" width="20" height="12" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="9" y1="7" x2="9" y2="19" stroke="currentColor" stroke-width=".8"/><line x1="15" y1="7" x2="15" y2="19" stroke="currentColor" stroke-width=".8"/><line x1="3" y1="13" x2="23" y2="13" stroke="currentColor" stroke-width=".8"/>'
};

let current=null;
const explored={mit:false,root:false,liczby:false};
const goldOnce={mit:false,root:false,liczby:false,visit:false,architekt:false};

/* ---------- panel ---------- */
const panelEl=document.getElementById('panel');
const VLABEL={mit:'Mit — naciągane',rygor:'Rygor — realne',mix:'Mieszany'};
function basePanel(){
  return `
    <div class="el"><span class="glyph">⛬</span> Komnata VI · Świątynia</div>
    <h1>Czy Partenon zna φ?</h1>
    <div class="gloss">werdykt mieszany — wybierz nakładkę u dołu</div>
    <p class="quote">„»Partenon = φ« to mit. Ale Grecy mieli realny, piękny system proporcji.”<span class="src">SECTIO AUREA · Komnata VI</span></p>
    <div class="note">Trzy nakładki nałożone na tę samą fasadę. Pierwsza to <b>legenda</b>, dwie kolejne — <b>prawdziwy rygor</b>. Porównaj, która faktycznie pasuje do bryły.</div>
    <span class="chip mix">Werdykt · Mieszany</span>`;
}
function updatePanel(key){
  if(!key){panelEl.innerHTML=basePanel();fadePanel();return;}
  const d=MODES[key];
  panelEl.innerHTML=`
    <div class="el"><span class="glyph">${d.glyph}</span> ${d.tag}</div>
    <h1>${d.name}</h1>
    <div class="gloss">${d.gloss}</div>
    <div class="nums">
      <div class="n"><b>${d.a}</b><span>stosunek</span></div>
      <div class="n"><b>${d.b}</b><span>charakter</span></div>
      <div class="n"><b>${d.cN}</b><span>metoda</span></div>
    </div>
    <p class="quote">„${d.quote}”<span class="src">${d.src}</span></p>
    <div class="note">${d.note}</div>
    <span class="chip ${d.verd==='mit'?'mix':(d.verd==='rygor'?'rygor':'mat')}">${d.verd==='mit'?'Mit — naciągane':'Rygor — realne'}</span>`;
  fadePanel();
}
function fadePanel(){
  panelEl.style.opacity='0';
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{panelEl.style.opacity='1';});});
}

/* ---------- dock ---------- */
const solidsEl=document.getElementById('solids');
ORDER.forEach(key=>{
  const d=MODES[key];
  const b=document.createElement('button');b.dataset.k=key;
  b.innerHTML=`<svg viewBox="0 0 26 26">${ICONS[key]}</svg><b>${d.name}</b><span>${d.tag}</span>`;
  b.addEventListener('click',()=>selectMode(key));
  solidsEl.appendChild(b);
});
function updateDock(key){
  document.querySelectorAll('#solids button').forEach(b=>b.classList.toggle('active',b.dataset.k===key));
}

function selectMode(key){
  const toggleOff=(current===key);
  current=toggleOff?null:key;
  // przełącz widoczność nakładek
  ORDER.forEach(k=>{OVMAP[k].visible=(k===current);});
  ovAppearT=0;
  updateDock(current);
  updatePanel(current);
  if(current){
    // złoto — raz za każdą zbadaną nakładkę
    if(!goldOnce[key]){
      goldOnce[key]=true;explored[key]=true;
      const toasts={mit:'Mit złotego prostokąta zbadany',root:'Prostokąty pierwiastkowe Hambidge’a',liczby:'Prawdziwy stosunek 9:4 odkryty'};
      if(window.SA)SA.add(8,toasts[key]);
      maybeArchitekt();
    }
  }
}
function maybeArchitekt(){
  if(goldOnce.architekt)return;
  if(explored.mit&&explored.root&&explored.liczby){
    goldOnce.architekt=true;
    if(window.SA)SA.award('architekt');   // integrator rejestruje odznakę; nieznane id → ostrzeżenie ignorujemy
  }
}

/* ---------- resize ---------- */
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
});

/* ---------- animate ---------- */
let appearT=0,ovAppearT=0;
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function animate(){
  requestAnimationFrame(animate);
  appearT=Math.min(1,appearT+0.03);
  const e=1-Math.pow(1-appearT,3);
  temple.scale.setScalar(0.4+0.6*e);
  if(current){
    ovAppearT=Math.min(1,ovAppearT+0.06);
    OVMAP[current].traverse(o=>{if(o.material){o.material.opacity=(o.userData.baseOp||o.material.opacity);}});
  }
  stars.rotation.y+=0.0003;
  fill.intensity=0.8+Math.sin(performance.now()*0.0011)*0.25;
  controls.update();
  composer.render();
}

/* ---------- go ---------- */
updatePanel(null);
animate();
setTimeout(()=>document.getElementById('loading').classList.add('gone'),650);
if(window.SA){SA.mountHUD();SA.visit('swiatynia');}
</script>
</body>
