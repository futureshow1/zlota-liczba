<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Filary — SECTIO AUREA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#08070d;--ink:#0c0b14;--panel:rgba(17,15,26,.9);--panel-2:#191527;
  --line:rgba(227,178,60,.18);--line-soft:rgba(236,230,214,.1);
  --gold:#e3b23c;--gold-br:#f2d27a;--gold-deep:#a9801f;
  --ivory:#ece6d6;--mute:#9a93a6;--faint:#6b6478;
  --verd:#5fb8a3;--crimson:#d2553f;--amber:#e0913a;--eso:#c9b6e0;--sci:#7db4e8;
  --ease:cubic-bezier(.4,.01,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--void);color:var(--ivory);overflow:hidden;
  font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
#scene{position:fixed;inset:0;z-index:0}
canvas{display:block}
.serif{font-family:"Fraunces",Georgia,serif}
#vig{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(130% 100% at 50% 46%,transparent 50%,rgba(0,0,0,.64) 100%)}

/* topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;pointer-events:none}
.brand{display:flex;align-items:baseline;gap:10px;pointer-events:auto}
.brand .phi{font-family:"Fraunces",serif;font-size:21px;color:var(--gold)}
.brand b{font-family:"Fraunces",serif;font-weight:500;font-size:15px;letter-spacing:.13em}
.brand small{font-size:9.5px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase}
.back{pointer-events:auto;font-size:12px;letter-spacing:.04em;color:var(--mute);text-decoration:none;
  padding:8px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(8,7,13,.5);
  backdrop-filter:blur(8px);transition:.25s}
.back:hover{color:var(--gold-br);border-color:var(--gold)}

/* intro line */
.intro{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:15;max-width:min(640px,90vw);
  text-align:center;font-family:"Fraunces",serif;font-style:italic;font-size:14.5px;line-height:1.5;
  color:var(--ivory);text-shadow:0 1px 8px #000;pointer-events:none;transition:opacity .6s}
.intro b{font-style:normal;font-weight:500;color:var(--gold-br)}
.intro.hide{opacity:0}

/* info panel — same language as bryly/loza */
.panel{position:fixed;top:50%;right:26px;transform:translateY(-50%);z-index:15;width:340px;max-width:86vw;
  background:var(--panel);backdrop-filter:blur(15px);border:1px solid var(--line);border-radius:18px;
  padding:24px 24px 22px;box-shadow:0 30px 80px -40px #000;transition:opacity .35s}
.panel .el{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.panel .el .glyph{font-size:13px}
.panel h1{font-family:"Fraunces",serif;font-weight:400;font-size:31px;margin:8px 0 2px;line-height:1.04}
.panel .gloss{font-size:12px;letter-spacing:.04em;color:var(--mute);margin-bottom:16px}
.panel .quote{font-family:"Fraunces",serif;font-style:italic;font-size:15px;line-height:1.5;color:var(--ivory);
  border-left:2px solid var(--gold);padding-left:14px;margin:0 0 6px}
.panel .quote .src{display:block;font-style:normal;font-family:Inter;font-size:10.5px;letter-spacing:.05em;color:var(--faint);margin-top:7px}
.panel .note{font-size:12.5px;line-height:1.62;color:#c2bbcf;margin-top:14px}
.panel .note b{color:var(--ivory)}
.panel .komnaty{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
.panel .km{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-br);
  padding:4px 10px;border-radius:999px;background:rgba(227,178,60,.08);border:1px solid rgba(227,178,60,.28)}
.panel.idle .gloss,.panel.idle .note{color:var(--mute)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;margin-top:16px}
.chip::before{content:"";width:6px;height:6px;border-radius:50%}
.chip.rygor{color:var(--gold-br);background:rgba(227,178,60,.1);border:1px solid rgba(227,178,60,.3)}
.chip.rygor::before{background:var(--gold)}
.chip.synt{color:var(--eso);background:rgba(201,182,224,.1);border:1px solid rgba(201,182,224,.32)}
.chip.synt::before{background:var(--eso)}
.chip.nauka{color:var(--sci);background:rgba(125,180,232,.1);border:1px solid rgba(125,180,232,.32)}
.chip.nauka::before{background:var(--sci)}

/* projected name labels (loza pattern) */
#labels{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden}
.nl{position:absolute;transform:translate(-50%,-130%);white-space:nowrap;text-align:center;
  font-family:"Fraunces",serif;font-size:12.5px;color:var(--ivory);text-shadow:0 1px 6px #000;transition:opacity .2s;letter-spacing:.01em}
.nl .yr{display:block;font-family:"Inter";font-size:8.5px;letter-spacing:.12em;color:var(--faint);margin-top:2px;opacity:.7}
.nl.hot{font-size:15px;color:var(--gold-br)}.nl.hot .yr{opacity:1;color:var(--mute)}
.nl.ghyka{color:var(--gold-br)}

.hint{position:fixed;bottom:26px;left:24px;z-index:15;font-size:10.5px;letter-spacing:.04em;color:var(--faint);max-width:210px;line-height:1.7;transition:opacity .5s}
.hint b{color:var(--mute)}
.hint.hide{opacity:0}

.legend{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:15;display:flex;gap:16px;pointer-events:none}
.legend .lg{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--mute)}
.legend .lg i{width:9px;height:9px;border-radius:50%}
@media(max-width:880px){.legend{display:none}}

#loading{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--void);transition:opacity .8s}
#loading.gone{opacity:0;pointer-events:none}
#loading .ph{font-family:"Fraunces",serif;font-size:60px;color:var(--gold);animation:spin 3s linear infinite}
#loading p{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);margin-top:18px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:820px){
  .panel{top:auto;bottom:96px;right:50%;transform:translateX(50%);width:min(420px,92vw)}
  .hint{display:none}
  .intro{top:64px;font-size:13px}
}
@media(prefers-reduced-motion:reduce){#loading .ph{animation:none}}
</style>
</head>
<body>
<div id="scene"></div>
<div id="vig"></div>

<div class="topbar">
  <div class="brand"><span class="phi">Φ</span><b>SECTIO&nbsp;AUREA</b><small>Filary</small></div>
  <a class="back" href="atlas.html#atlas">← Atlas</a>
</div>

<div class="intro" id="intro">Ośmiu, którzy nieśli liczbę przez 2500 lat — <b>Ghyka jest jednym z nich, nie autorem.</b></div>
<div id="labels"></div>

<aside class="panel idle" id="panel"><!-- filled by JS --></aside>

<div class="legend">
  <div class="lg"><i style="background:var(--gold-br)"></i>Rdzeń geometryczny</div>
  <div class="lg"><i style="background:var(--eso)"></i>Synteza</div>
  <div class="lg"><i style="background:var(--sci)"></i>Nauka</div>
</div>

<div class="hint">Przeciągnij, by przejść wzdłuż kolumnady<br><b>scroll</b> = przybliż · najedź na filar</div>

<div id="loading"><div class="ph">Φ</div><p>wznoszę kolumnadę</p></div>

<script src="i18n.js"></script>
<script src="progress.js"></script>
<script src="menu.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const PHI=(1+Math.sqrt(5))/2;
const TAU=Math.PI*2;
const COL={core:0xf2d27a,synt:0xc9b6e0,sci:0x7db4e8};

/* ---------- the eight pillars ---------- */
const PILLARS=[
  {n:'Pitagoras',yr:'~530 p.n.e.',kind:'core',
   el:'Rdzeń geometryczny',glyph:'✦',
   gloss:'bractwo · pentagram · harmonia',
   quote:'Liczba jest zasadą wszystkiego.',
   src:'Pitagorejczycy, Kroton',
   note:'Założyciel tradycji. <b>Pentagram</b> (pentalfa) — tajny znak rozpoznawczy wtajemniczonych — sam w sobie kryje złoty podział. Liczba jako fundament bytu i harmonii.',
   komnaty:['Liczba','Pentada'],chip:'rygor'},

  {n:'Euklides',yr:'~300 p.n.e.',kind:'core',
   el:'Rdzeń geometryczny',glyph:'∠',
   gloss:'pierwsza ścisła definicja',
   quote:'Podział odcinka w skrajnej i średniej proporcji.',
   src:'Elementy, ks. VI',
   note:'Pierwsza <b>matematycznie ścisła</b> definicja złotego cięcia — bez mistyki, czysta geometria. Od Euklidesa φ jest twierdzeniem, nie wierzeniem.',
   komnaty:['Cięcie','Bryły'],chip:'rygor'},

  {n:'Leonardo Fibonacci',yr:'~1202',kind:'core',
   el:'Rdzeń geometryczny',glyph:'∿',
   gloss:'ciąg 1,1,2,3,5,8…',
   quote:'Ilorazy kolejnych wyrazów ciągu dążą do φ.',
   src:'Liber Abaci (1202)',
   note:'Ciąg, w którym każdy wyraz jest sumą dwóch poprzednich — a stosunek sąsiednich wyrazów zbiega do <b>złotej liczby</b>. Most między arytmetyką a wzrostem w przyrodzie.',
   komnaty:['Proporcja','Ogród'],chip:'rygor'},

  {n:'Pacioli i Leonardo',yr:'1509',kind:'core',
   el:'Rdzeń geometryczny',glyph:'✶',
   gloss:'„boska proporcja"',
   quote:'De divina proportione.',
   src:'Luca Pacioli, ilustr. Leonardo da Vinci',
   note:'Złota proporcja <b>ochrzczona jako „boska"</b>. Pacioli pisze traktat, Leonardo rysuje bryły i kanon ciała. Renesansowy moment, w którym φ wchodzi do sztuki.',
   komnaty:['Ciało','Cięcie'],chip:'rygor'},

  {n:'Johannes Kepler',yr:'1596',kind:'sci',
   el:'Nauka',glyph:'☉',
   gloss:'dwa skarby geometrii',
   quote:'Dwa skarby geometrii: twierdzenie Pitagorasa i złoty podział.',
   src:'Johannes Kepler',
   note:'Stawia złoty podział obok twierdzenia Pitagorasa jako jeden z dwóch <b>klejnotów geometrii</b>. Bryły platońskie w modelu kosmosu — astronomia szuka w nich porządku.',
   komnaty:['Bryły','Nauka'],chip:'nauka'},

  {n:'D’Arcy Thompson',yr:'1917',kind:'sci',
   el:'Nauka',glyph:'🜔',
   gloss:'prawa kształtu w biologii',
   quote:'On Growth and Form.',
   src:'D’Arcy Wentworth Thompson',
   note:'<b>Spirala logarytmiczna</b> i wzrost gnomoniczny jako prawa kształtu w przyrodzie: muszle, rogi, liście. Biologia jako geometria — tu φ przestaje być estetyką, a staje się prawem wzrostu.',
   komnaty:['Gnomon','Ogród'],chip:'nauka'},

  {n:'Matila Ghyka',yr:'1931',kind:'core',ghyka:true,
   el:'Synteza · przewodnik',glyph:'Φ',
   gloss:'wielka synteza tradycji',
   quote:'Le Nombre d’Or — synteza dwóch i pół tysiąca lat.',
   src:'Matila C. Ghyka',
   note:'Przewodnik tego portalu — i <b>jeden z filarów, nie autor tematu</b>. Spina całą tradycję w jedno. Zarazem ostrzeżenie: tu kończy się rygor, a zaczyna romantyzm. Czytamy go z podziwem i czujnością.',
   komnaty:['wszystkie komnaty'],chip:'synt'},

  {n:'Penrose i Shechtman',yr:'1974 / 1982',kind:'sci',
   el:'Nauka',glyph:'⬠',
   gloss:'φ w materii · Nobel 2011',
   quote:'Kafle aperiodyczne i quasikryształy.',
   src:'Roger Penrose · Dan Shechtman',
   note:'<b>5-krotna symetria w materii.</b> Kafle Penrose’a pokrywają płaszczyznę bez powtórzeń, z φ wpisanym w proporcje; Shechtman odkrywa quasikryształy — Nobel 2011. Naukowa pointa całej tradycji.',
   komnaty:['Pentada','Probierz'],chip:'nauka'}
];

/* ---------- renderer / scene / camera ---------- */
const host=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;
host.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x08070d);
scene.fog=new THREE.FogExp2(0x08070d,0.052);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,120);
camera.position.set(6.2,2.4,11.5);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;
controls.autoRotate=true;controls.autoRotateSpeed=0.42;
controls.minDistance=6;controls.maxDistance=26;
controls.enablePan=false;
controls.target.set(0,1.4,0);
controls.minPolarAngle=0.55;controls.maxPolarAngle=Math.PI*0.62;

/* environment for subtle reflections */
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

/* lights */
scene.add(new THREE.AmbientLight(0xffffff,0.28));
const key=new THREE.DirectionalLight(0xffe9c0,1.3);key.position.set(5,8,6);scene.add(key);
const rim=new THREE.DirectionalLight(0x88b8ff,0.6);rim.position.set(-7,-1,-5);scene.add(rim);
const core=new THREE.PointLight(0xf2d27a,1.6,30);core.position.set(0,3.2,0);scene.add(core);

/* ---------- starfield ---------- */
const stars=(()=>{
  const N=1700,pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=11+Math.random()*20,th=Math.random()*TAU,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);
  }
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0xe3b23c,size:0.034,transparent:true,opacity:0.5,
    sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
  const p=new THREE.Points(g,m);scene.add(p);return p;
})();

/* ---------- post-processing (bloom) ---------- */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.72,0.55,0.8);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ---------- colonnade geometry constants ---------- */
const ARC_R=7.4, ARC_A=-0.92, ARC_B=0.92;   // gentle arc placement
const baseH=0.34, capH=0.32;

/* ---------- the floor: a faint reflective stylobate ---------- */
(()=>{
  const g=new THREE.CircleGeometry(13,72);
  const m=new THREE.MeshStandardMaterial({color:0x0d0b16,roughness:0.55,metalness:0.4,
    emissive:0x0a0913,emissiveIntensity:0.4});
  const floor=new THREE.Mesh(g,m);floor.rotation.x=-Math.PI/2;floor.position.y=0;scene.add(floor);
  // a thin golden line tracing the colonnade arc on the floor
  const N=160,pts=[];
  for(let i=0;i<=N;i++){const a=ARC_A+(ARC_B-ARC_A)*i/N;pts.push(new THREE.Vector3(Math.sin(a)*ARC_R,0.012,Math.cos(a)*ARC_R));}
  const lg=new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0x6b5a2a,transparent:true,opacity:0.45})));
})();

/* ---------- build the colonnade ---------- */
const colGroup=new THREE.Group();scene.add(colGroup);
const pillarMeshes=[];        // shafts (raycast targets)

PILLARS.forEach((p,i)=>{
  const t=i/(PILLARS.length-1);
  const ang=ARC_A+(ARC_B-ARC_A)*t;
  const x=Math.sin(ang)*ARC_R, z=Math.cos(ang)*ARC_R;
  const tall=p.ghyka;
  const shaftH=tall?4.5:3.5;
  const rad=tall?0.40:0.34;

  const g=new THREE.Group();
  g.position.set(x,0,z);
  // face inward (toward centre) so flutes/normals read consistently
  g.lookAt(0,0,0);

  const tint=COL[p.kind];

  /* shaft — fluted column via many-sided cylinder, gold-glass emissive */
  const shaftGeo=new THREE.CylinderGeometry(rad*0.86,rad,shaftH,tall?40:28,1,false);
  const shaftMat=new THREE.MeshPhysicalMaterial({
    color:tint,metalness:0.1,roughness:0.28,
    transmission:0.35,thickness:0.8,ior:1.3,
    transparent:true,opacity:0.92,
    emissive:tint,emissiveIntensity:tall?0.55:0.34,
    clearcoat:1.0,clearcoatRoughness:0.3,reflectivity:0.6});
  const shaft=new THREE.Mesh(shaftGeo,shaftMat);
  shaft.position.y=baseH+shaftH/2;
  shaft.userData.i=i;
  g.add(shaft);

  /* vertical flute lines (subtle) */
  const fl=new THREE.LineSegments(
    new THREE.EdgesGeometry(shaftGeo,1),
    new THREE.LineBasicMaterial({color:tint,transparent:true,opacity:0.22}));
  fl.position.copy(shaft.position);
  g.add(fl);

  /* base (plinth + torus) */
  const baseGeo=new THREE.CylinderGeometry(rad*1.5,rad*1.7,baseH,tall?40:28);
  const stoneMat=new THREE.MeshStandardMaterial({color:0x141021,roughness:0.5,metalness:0.35,
    emissive:tint,emissiveIntensity:0.06});
  const base=new THREE.Mesh(baseGeo,stoneMat);base.position.y=baseH/2;g.add(base);

  /* capital (echinus + abacus) */
  const ech=new THREE.Mesh(new THREE.CylinderGeometry(rad*1.55,rad*0.9,capH*0.6,tall?40:28),stoneMat.clone());
  ech.position.y=baseH+shaftH+capH*0.3;g.add(ech);
  const ab=new THREE.Mesh(new THREE.BoxGeometry(rad*3.1,capH*0.42,rad*3.1),stoneMat.clone());
  ab.position.y=baseH+shaftH+capH*0.72;g.add(ab);

  /* a glowing finial orb on top — brighter on Ghyka */
  const orbGeo=new THREE.SphereGeometry(tall?0.26:0.18,28,28);
  const orbMat=new THREE.MeshStandardMaterial({color:tint,emissive:tint,
    emissiveIntensity:tall?1.4:0.9,roughness:0.3,metalness:0.1});
  const orb=new THREE.Mesh(orbGeo,orbMat);
  orb.position.y=baseH+shaftH+capH+ (tall?0.30:0.22);
  g.add(orb);
  const halo=new THREE.Mesh(new THREE.SphereGeometry((tall?0.26:0.18)*1.9,20,20),
    new THREE.MeshBasicMaterial({color:tint,transparent:true,opacity:0.06,depthWrite:false}));
  orb.add(halo);

  colGroup.add(g);

  p._group=g;p._shaft=shaft;p._flute=fl;p._orb=orb;
  p._baseEmis=tall?0.55:0.34; p._orbBase=tall?1.4:0.9;
  // top-of-orb world position for label projection
  p._labelPos=new THREE.Vector3(x, orb.position.y+0.55, z);
  pillarMeshes.push(shaft);
});

/* ---------- projected name labels (loza pattern) ---------- */
const labelsEl=document.getElementById('labels');
const labels=PILLARS.map(p=>{
  const el=document.createElement('div');
  el.className='nl'+(p.ghyka?' ghyka':'');
  el.innerHTML=`${p.n}<span class="yr">${p.yr}</span>`;
  labelsEl.appendChild(el);return el;
});

/* ---------- info panel ---------- */
const panelEl=document.getElementById('panel');
function idlePanel(){
  panelEl.classList.add('idle');
  panelEl.innerHTML=`
    <div class="el"><span class="glyph">Φ</span> Filary</div>
    <h1>Osiem filarów</h1>
    <div class="gloss">2500 lat matematyki piękna i wzrostu</div>
    <div class="note">Złota liczba należy do <b>tematu</b>, nie do jednego autora. Ośmiu myślicieli niosło ją przez wieki — od pitagorejskiego bractwa po quasikryształy. <b>Matila Ghyka</b> jest jednym z tych filarów: wielkim syntetykiem, lecz nie wynalazcą. Najedź na kolumnę, by poznać filar.</div>`;
}
function showPillar(i){
  const p=PILLARS[i];
  panelEl.classList.remove('idle');
  panelEl.innerHTML=`
    <div class="el"><span class="glyph">${p.glyph}</span> ${p.el}</div>
    <h1>${p.n}</h1>
    <div class="gloss">${p.yr} · ${p.gloss}</div>
    <p class="quote">„${p.quote}"<span class="src">${p.src}</span></p>
    <div class="note">${p.note}</div>
    <div class="komnaty">${p.komnaty.map(k=>`<span class="km">${k}</span>`).join('')}</div>
    <span class="chip ${p.chip}">${p.chip==='rygor'?'Rygor':(p.chip==='nauka'?'Nauka':'Synteza · przewodnik')}</span>`;
  panelEl.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{panelEl.style.opacity='1';}));
}
idlePanel();

/* ---------- raycast: hover → highlight + click to pin ---------- */
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
let hover=-1,pinned=-1;
function pick(ev){
  ndc.x=ev.clientX/innerWidth*2-1;ndc.y=-(ev.clientY/innerHeight*2-1);
  ray.setFromCamera(ndc,camera);
  const h=ray.intersectObjects(pillarMeshes,false);
  return h.length?h[0].object.userData.i:-1;
}
function applyHighlight(){
  PILLARS.forEach((p,k)=>{
    const on=(k===hover)||(k===pinned&&hover<0);
    const em=on?(p.ghyka?1.3:1.05):p._baseEmis;
    p._shaft.material.emissiveIntensity=em;
    p._flute.material.opacity=on?0.5:0.22;
    p._orb.material.emissiveIntensity=on?(p.ghyka?1.9:1.45):p._orbBase;
  });
  labels.forEach((el,k)=>el.classList.toggle('hot',k===hover||(k===pinned&&hover<0)));
}
function setHover(i){
  if(i===hover)return;
  hover=i;
  renderer.domElement.style.cursor=i>=0?'pointer':'grab';
  controls.autoRotateSpeed=i>=0?0.08:0.42;
  applyHighlight();
  if(i>=0){showPillar(i);document.getElementById('intro').classList.add('hide');document.getElementById('hint')?.classList.add('hide');}
  else if(pinned>=0){showPillar(pinned);}
  else{idlePanel();}
}
let downXY=null;
renderer.domElement.addEventListener('pointermove',e=>setHover(pick(e)));
renderer.domElement.addEventListener('pointerdown',e=>downXY=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY)return;
  const mv=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;
  if(mv>6)return;                       // was a drag, not a click
  const i=pick(e);
  pinned=(i>=0&&i===pinned)?-1:i;       // toggle pin
  applyHighlight();
  if(pinned>=0)showPillar(pinned); else if(hover<0) idlePanel();
});

/* ---------- resize ---------- */
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
});

/* ---------- animate ---------- */
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const ghyka=PILLARS.find(p=>p.ghyka);
const v=new THREE.Vector3();
function animate(t){
  requestAnimationFrame(animate);
  if(!reduce){
    stars.rotation.y+=0.0003;
    core.intensity=1.4+Math.sin(t*0.0011)*0.35;
    // gentle pulse on Ghyka's pillar (only when not actively highlighted)
    if(ghyka){
      const idx=PILLARS.indexOf(ghyka);
      if(hover!==idx && pinned!==idx){
        const pulse=0.55+Math.sin(t*0.0022)*0.22;
        ghyka._shaft.material.emissiveIntensity=pulse;
        ghyka._orb.material.emissiveIntensity=1.4+Math.sin(t*0.0022)*0.4;
      }
    }
  }
  controls.update();

  /* project labels each frame from each pillar's orb position (loza pattern) */
  PILLARS.forEach((p,k)=>{
    v.copy(p._labelPos);
    const proj=v.clone().project(camera);
    const el=labels[k];
    if(proj.z>1){el.style.opacity='0';return;}
    const x=(proj.x*0.5+0.5)*innerWidth, y=(-proj.y*0.5+0.5)*innerHeight;
    el.style.left=x+'px';el.style.top=y+'px';
    const dist=camera.position.distanceTo(p._labelPos);
    const hot=el.classList.contains('hot');
    el.style.opacity=String(hot?1:Math.max(0.2,Math.min(0.7,(24-dist)/18)));
  });

  composer.render();
}

/* ---------- go ---------- */
applyHighlight();
requestAnimationFrame(animate);
setTimeout(()=>document.getElementById('loading').classList.add('gone'),650);
if(window.SA){SA.mountHUD();}   // Filary is a meta-room — no SA.visit
</script>
</body>
